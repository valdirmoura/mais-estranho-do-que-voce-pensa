name: voceestranho

x-logging: &logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "3"

services:
  quiz-redis:
    image: redis:7-alpine
    container_name: quiz-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    logging: *logging
    volumes:
      - quiz_redis_data:/data
    networks:
      - quiz_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  quiz-app:
    build:
      context: ../../site
      dockerfile: Dockerfile
    container_name: quiz-app
    restart: unless-stopped
    logging: *logging
    depends_on:
      quiz-redis:
        condition: service_healthy
    environment:
      REDIS_URL: ${REDIS_URL}
      PORT: ${PORT}
    networks:
      - vps_public
      - quiz_internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${PORT:-3000}/api/contador >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  vps_public:
    external: true
    name: vps_public
  quiz_internal:
    internal: true

volumes:
  quiz_redis_data:
